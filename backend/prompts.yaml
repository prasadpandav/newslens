# Every agent prompt lives here. Edit English, not Python.
# Placeholders in {braces} are filled by the code.

entities: |
  Extract from this news item. Reply ONLY with JSON:
  {{"entities": [...], "sectors": [...], "regions": [...]}}
  Title: {title}
  Summary: {summary}

trend: |
  You are a senior news analyst covering the "{topic}" beat. Below are {n} recent news
  items from this topic, each on its own line prefixed with an index in [brackets], then
  source, key entities/sectors, and a summary excerpt:
  {items}
  Analyse them together in one pass. Reason carefully: what forces connect groups of
  items, what is driving each, where is it heading, how many distinct sources corroborate it.
  Return TWO kinds of trend:
  - "trends": established macro trends in this topic (each needs >= 2 items).
  - "micro_trends": small but EMERGING signals (2-5 items) where coverage is only just
    starting to pick up — not yet mainstream. Skip anything already large or obvious.
  These trends are ALREADY being tracked from previous runs:
  {existing}
  Rules:
  - If a trend you see is the same underlying force as an already-tracked one, reuse
    that existing name VERBATIM (so it updates in place instead of duplicating).
    Only coin a new name for a genuinely new force.
  - New names read like sharp magazine section titles, 3-6 vivid words, SPECIFIC to
    their items (not generic). No label prefixes like "Trend:", "Rising focus", "early signal".
  - Produce DISTINCT trends; never two near-duplicates for the same force.
  - "members" lists the [bracket] indices of the items in that trend.
  Reply ONLY with JSON:
  {{"trends": [{{"name": "short trend name", "narrative": "2-3 sentences",
     "sectors": [...], "regions": [...], "members": [1, 4]}}],
    "micro_trends": [{{"name": "short name", "narrative": "1-2 sentences",
     "members": [2, 5]}}]}}

signals_unit: |
  You are the foresight engine for the "{topic}" beat. Below are {n} rich digests of
  recent {topic} stories, one per block, formatted as:
  story_id | topic | headline | credibility | entities | key claims | narrative excerpt
  {digests}
  Reason step by step. Trace where second-order pressure is building within and around
  this domain: if a development here is real, what does it force next, and does another
  story here independently corroborate that direction? Discard chains that rest on a
  single story or on low-credibility reporting.
  Identify 1-4 forward-looking SIGNALS: non-obvious inferences about what may happen next
  in or adjacent to this area. Name the sectors/regions that would be affected.
  These forecasts are ALREADY being tracked from previous runs:
  {existing}
  Rules:
  - If a signal you see is the same underlying forecast as an already-tracked one, reuse
    that existing title VERBATIM (so it is refreshed in place instead of duplicated).
    Only coin a new title for a genuinely new forecast.
  - Every signal must cite 2 or more story_ids from the digests as evidence.
  - The chain must be concrete and step-by-step, not vague hand-waving.
  - Be honest about uncertainty; confidence 0-1. Do not exceed 0.85.
  Reply ONLY with JSON:
  {{"signals": [{{"title": "5-9 vivid words, no label prefixes",
     "prediction": "one sentence: what may happen",
     "chain": "the step-by-step causal reasoning",
     "watch": "the leading indicator a reader should watch",
     "affected": ["who/what is affected"], "horizon": "e.g. 2-8 weeks",
     "confidence": 0.0, "story_ids": ["...", "..."]}}]}}

micro_trend: |
  Below are {n} news items from the last 72 hours, each prefixed with an index in
  [brackets], then source, entities, and a summary excerpt:
  {items}
  In one pass, find EMERGING micro-trends: small but accelerating clusters (2-5 items)
  where coverage is just starting to pick up — early signals, not yet mainstream. Skip
  anything already large or obvious. Each micro-trend needs 2-5 item indices.
  Give each a 3-6 vivid-word name (no "early signal" text, no label prefixes) and a
  1-2 sentence signal describing what it may be the start of.
  Reply ONLY with JSON:
  {{"micro_trends": [{{"name": "...", "signal": "...", "members": [2, 5]}}]}}

connection: |
  Story A: {a}
  Story B: {b}
  These look unrelated on the surface. Trace any real causal, economic, or policy chain
  by which one affects the other. Be skeptical: if there is no meaningful link, use
  confidence 0. Reply ONLY with JSON:
  {{"chain": "the step-by-step link, plainly explained", "confidence": 0.0, "affected": [...]}}

claims: |
  List the 1-4 most important checkable factual claims in this story.
  Reply ONLY with JSON: {{"claims": ["...", "..."]}}
  Story: {text}

verify: |
  Claims: {claims}
  Corroboration: {corroboration} of the ingested sources independently report this story.
  Source reputation tier (1 best - 4 worst): {tier}
  Assess each claim and give an overall corroboration score 0-100 (this measures how well
  supported the story is, NOT absolute truth). Reply ONLY with JSON:
  {{"verdicts": [{{"claim": "...", "verdict": "corroborated|unverified|disputed", "note": "..."}}],
    "score": 0, "note": "one-line rationale"}}

story: |
  Write this news as a short story-format piece: a hook, what happened, why it matters
  now, and what to watch next. 120-180 words, plain language, no hype beyond the facts.
  Start directly with the hook — never open with meta phrases like "Here's the story",
  "In this story", or "This article".
  Then write a headline that is genuinely catchy and attention-grabbing — use tension,
  a concrete stake, or a sharp question — while staying strictly true to the verified
  claims below: every factual element in the headline must appear in the claims. Make sure the what happened is clearly providing story and painting a picture to the reader, and the why it matters is clearly explaining the implications.
  Never use generic templates like "What Just Changed and Why It Matters".
  Verified claims: {claims}
  Source items: {items}
  Reply ONLY with JSON: {{"headline": "...", "narrative": "..."}}

signals: |
  You are the foresight engine of a news-intelligence service. Below are {n} rich
  digests of recent stories across many topics, one per block, formatted as:
  story_id | topic | headline | credibility | entities | key claims | narrative excerpt
  {digests}
  Reason step by step before you answer. First, mentally map which entities, sectors
  and regions recur across DIFFERENT topics. Then trace where second-order pressure is
  building: if development X is real, what does it force downstream, and does another
  story in the set independently corroborate that direction? Discard chains that rest
  on a single story or on low-credibility reporting.
  Identify 3-7 SIGNALS: forward-looking inferences where stories from DIFFERENT
  topics combine to suggest something that may happen next. Focus on indirect,
  cross-domain causal chains — e.g. AI demand raises memory-chip prices, which
  raises consumer electronics prices; a geopolitical move raises shipping costs,
  which shows up in retail inflation. The best signals are non-obvious but
  rigorous; skip anything a single headline already says outright.
  These forecasts are ALREADY being tracked from previous runs:
  {existing}
  Rules:
  - If a signal you see is the same underlying forecast as an already-tracked one, reuse
    that existing title VERBATIM (so it is refreshed in place instead of duplicated).
    Only coin a new title for a genuinely new forecast.
  - Every signal must cite 2 or more story_ids from the digests as evidence.
    More corroborating stories = stronger signal.
  - The chain must be concrete and step-by-step, not vague hand-waving.
  - Prefer chains supported by higher-credibility stories.
  - Be honest about uncertainty; confidence 0-1. Do not exceed 0.85.
  Reply ONLY with JSON:
  {{"signals": [{{"title": "5-9 vivid words, no label prefixes",
     "prediction": "one sentence: what may happen",
     "chain": "the step-by-step causal reasoning",
     "watch": "the leading indicator a reader should watch",
     "affected": ["who/what is affected"], "horizon": "e.g. 2-8 weeks",
     "confidence": 0.0, "story_ids": ["...", "..."]}}]}}

ask: |
  You are the reader's news intelligence assistant. Answer their question about the
  story below. Be accurate, cite only what the story and claims support, admit
  uncertainty plainly, and keep it under 120 words. If the reader profile is relevant,
  tailor the answer to them.
  Reader profile: {context}
  {story}
  Question: {question}
  Reply ONLY with JSON:
  {{"answer": "...", "followups": ["2-3 natural follow-up questions"]}}

personalize: |
  Reader profile: {context}
  Story headline: {headline}
  Story: {narrative}
  Related trends: {trends}
  In 2-4 sentences, explain what this story could mean for THIS reader specifically —
  their work, business, city, family or money. Be concrete, honest about uncertainty,
  and never invent facts. Then score personal impact 0-3 (0 none, 3 high).
  Reply ONLY with JSON: {{"impact_text": "...", "impact_score": 0}}
